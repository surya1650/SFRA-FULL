        measurement_terminal: "2N"
        delta_alternate: { injection: "2W", measurement: "2U" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, LV phase T."

      # ---- 7-9: EESC HV with LV shorted (3 phases) ----
      - sequence: 7
        code: EESC_HV_R
        category: EESC_HV
        winding: HV
        phase: R
        injection_terminal: "1U"
        measurement_terminal: "1N"
        shorted_terminals: ["2U", "2V", "2W"]
        grounded_terminals: []
        description: "End-to-end short circuit, HV phase R, with LV winding shorted (2U-2V-2W tied)."
      - sequence: 8
        code: EESC_HV_S
        category: EESC_HV
        winding: HV
        phase: S
        injection_terminal: "1V"
        measurement_terminal: "1N"
        shorted_terminals: ["2U", "2V", "2W"]
        grounded_terminals: []
        description: "End-to-end short circuit, HV phase S, with LV winding shorted."
      - sequence: 9
        code: EESC_HV_T
        category: EESC_HV
        winding: HV
        phase: T
        injection_terminal: "1W"
        measurement_terminal: "1N"
        shorted_terminals: ["2U", "2V", "2W"]
        grounded_terminals: []
        description: "End-to-end short circuit, HV phase T, with LV winding shorted."

      # ---- 10-12: Capacitive inter-winding HV-LV (HV energised, LV floating) ----
      - sequence: 10
        code: CIW_HV_LV_R
        category: CIW_HV_LV
        winding: HV-LV
        phase: R
        injection_terminal: "1U"
        measurement_terminal: "2U"
        shorted_terminals: []
        grounded_terminals: []
        description: "Capacitive inter-winding HV→LV, phase R. HV energised, LV floating."
      - sequence: 11
