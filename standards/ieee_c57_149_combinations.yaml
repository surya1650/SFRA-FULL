  # ---------------------------------------------------------------------------
  # 5.4 THREE_WINDING — 36 combinations
  # Three full-rated windings: HV (winding 1), IV (winding 2), LV (winding 3,
  # typically delta). Default EESC pairs the measured winding with the next-
  # adjacent one shorted; cross-shorts get explicit _LVS / _HVS suffixes.
  #
  # NOTE: this enumeration is the spec v2 default. APTRANSCO engineering may
  # prune to a 18- or 24-row subset for routine testing — flag in
  # docs/DECISIONS.md before any rows are removed; the validator enforces
  # the row count, so changes propagate to all downstream consumers.
  # ---------------------------------------------------------------------------
