        winding: LV
        phase: S
        injection_terminal: "2V"
        measurement_terminal: "2N"
        delta_alternate: { injection: "2V", measurement: "2W" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, LV phase S."
      - sequence: 6
