metadata:
  spec_version: 2
  schema_version: 1
  source_standards:
  - IEEE C57.149-2012, Clause 5 + Table 1
  - CIGRE WG A2.26 / TB 342, 2008
  - CIGRE TB 812, 2020
  - IEC 60076-18:2012
  - DL/T 911-2004 (R-factor sub-bands and thresholds)
  notes: 'Spec v2 catalogue. THREE_WINDING is intentionally not enumerated here pending
    Phase 1 engineering review with APTRANSCO. The other three transformer types are
    fully enumerated and ready for seeding.

    '
bands:
  spec_v2:
  - code: LOW
    min_hz: 20
    max_hz: 2000
    dominates: Core / residual magnetism / shorted turns / open magnetic circuit
  - code: MID_L
    min_hz: 2000
    max_hz: 20000
    dominates: Bulk winding movement / shunt impedance / main insulation
  - code: MID
    min_hz: 20000
    max_hz: 400000
    dominates: "Main winding deformation \u2014 axial / radial / disc displacement"
  - code: HIGH
    min_hz: 400000
    max_hz: 1000000
    dominates: Lead dressing / grounding / tap-changer contact / setup artefacts
  - code: HIGH_EXT
    min_hz: 1000000
    max_hz: 2000000
    dominates: Instrument / lead / bushing artefacts (when sweep extends)
    optional: true
  dl_t_911:
  - code: RLW
    min_hz: 1000
    max_hz: 100000
  - code: RLM
    min_hz: 100000
    max_hz: 600000
  - code: RLH
    min_hz: 600000
    max_hz: 1000000
dl_t_911_thresholds:
  RLW:
    normal:
      min: 2.0
    slight:
      min: 1.0
      max: 2.0
    obvious:
      min: 0.6
      max: 1.0
    severe:
      max: 0.6
  RLM:
    normal:
      min: 1.0
    slight:
      min: 0.6
      max: 1.0
    obvious:
      min: 0.2
      max: 0.6
    severe:
      max: 0.2
  RLH:
    normal:
      min: 0.6
    informational_only: true
transformer_types:
  TWO_WINDING:
    description: Two-winding power transformer (HV + LV). E.g. 220/33 kV YNd11.
    minimum_recommended: 9
    total: 15
    combinations:
    - sequence: 1
      code: EEOC_HV_R
      category: EEOC_HV
      winding: HV
      phase: R
      injection_terminal: 1U
      measurement_terminal: 1N
      delta_alternate:
        injection: 1U
        measurement: 1V
      shorted_terminals: []
      grounded_terminals: []
      description: End-to-end open circuit, HV phase R. All non-measured terminals
        floating.
    - sequence: 2
      code: EEOC_HV_S
      category: EEOC_HV
      winding: HV
      phase: S
      injection_terminal: 1V
