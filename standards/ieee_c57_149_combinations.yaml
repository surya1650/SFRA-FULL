      # ---- 13-15: Inductive inter-winding HV-LV (HV energised, LV phase-shorted) ----
      - sequence: 13
        code: IIW_HV_LV_R
        category: IIW_HV_LV
        winding: HV-LV
        phase: R
        injection_terminal: "1U"
