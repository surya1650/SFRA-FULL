      grounded_terminals: []
      description: End-to-end open circuit, LV phase T.
    - sequence: 7
      code: EESC_HV_R
      category: EESC_HV
      winding: HV
      phase: R
      injection_terminal: 1U
      measurement_terminal: 1N
      shorted_terminals:
      - 2U
      - 2V
      - 2W
      grounded_terminals: []
      description: End-to-end short circuit, HV phase R, with LV winding shorted (2U-2V-2W
