# =============================================================================
# IEEE C57.149-2012 — APTRANSCO SFRA combination catalogue (spec v2 §5)
# =============================================================================
#
# This file is the SINGLE SOURCE OF TRUTH for which SFRA combinations exist
# per transformer type. Edit here, validate via `make validate-catalogue`,
# regenerate downstream artefacts (UI dropdowns, FRAX importer expectations,
# report tables). Never duplicate this list elsewhere.
#
# Schema is enforced by scripts/validate_catalogue.py; pre-commit blocks any
# commit that breaks the row counts or code patterns.
#
# Codes follow the FRAX → combination_code resolver in spec v2 §4.1:
#   EEOC_<WND>_<R|S|T>                 end-to-end open circuit
#   EESC_<WND>_<R|S|T>                 end-to-end short circuit (default: LV/IV shorted)
#   EESC_<WND>_<R|S|T>_TVS             ...with tertiary winding shorted instead
#   CIW_<WND_A>_<WND_B>_<R|S|T>        capacitive inter-winding
#   IIW_<WND_A>_<WND_B>_<R|S|T>        inductive inter-winding
#
# Terminal labels follow MEGGER FRAX naming (what the engineer sees on the
# instrument), translated into IEEE C57.149 terminals in DECISIONS.md:
#   HV (winding 1): 1U, 1V, 1W, 1N
#   IV / LV (winding 2): 2U, 2V, 2W, 2N
#   TV (winding 3, delta): 3U, 3V, 3W
# =============================================================================

metadata:
  spec_version: 2
  schema_version: 1
  source_standards:
    - "IEEE C57.149-2012, Clause 5 + Table 1"
    - "CIGRE WG A2.26 / TB 342, 2008"
    - "CIGRE TB 812, 2020"
    - "IEC 60076-18:2012"
    - "DL/T 911-2004 (R-factor sub-bands and thresholds)"
  notes: >
    Spec v2 catalogue. THREE_WINDING is intentionally not enumerated here
    pending Phase 1 engineering review with APTRANSCO. The other three
    transformer types are fully enumerated and ready for seeding.

# -----------------------------------------------------------------------------
# Frequency bands — single source of truth, used by sfra_analysis/bands.py
# -----------------------------------------------------------------------------
bands:
  spec_v2:
    - { code: LOW,    min_hz: 20,        max_hz: 2_000,     dominates: "Core / residual magnetism / shorted turns / open magnetic circuit" }
    - { code: MID_L,  min_hz: 2_000,     max_hz: 20_000,    dominates: "Bulk winding movement / shunt impedance / main insulation" }
    - { code: MID,    min_hz: 20_000,    max_hz: 400_000,   dominates: "Main winding deformation — axial / radial / disc displacement" }
    - { code: HIGH,   min_hz: 400_000,   max_hz: 1_000_000, dominates: "Lead dressing / grounding / tap-changer contact / setup artefacts" }
    - { code: HIGH_EXT, min_hz: 1_000_000, max_hz: 2_000_000, dominates: "Instrument / lead / bushing artefacts (when sweep extends)", optional: true }

  # DL/T 911-2004 sub-bands used for the RLW / RLM / RLH relative-factor
  # diagnostic (spec v2 §7.3). Kept distinct from the spec_v2 bands above
  # because the threshold table is RL-specific.
  dl_t_911:
    - { code: RLW, min_hz: 1_000,    max_hz: 100_000  }
    - { code: RLM, min_hz: 100_000,  max_hz: 600_000  }
    - { code: RLH, min_hz: 600_000,  max_hz: 1_000_000 }

# -----------------------------------------------------------------------------
# DL/T 911 thresholds (default; tunable in sfra_analysis/verdict.py)
# -----------------------------------------------------------------------------
dl_t_911_thresholds:
  RLW:
    normal: { min: 2.0 }
    slight: { min: 1.0, max: 2.0 }
    obvious: { min: 0.6, max: 1.0 }
    severe: { max: 0.6 }
  RLM:
    normal: { min: 1.0 }
    slight: { min: 0.6, max: 1.0 }
    obvious: { min: 0.2, max: 0.6 }
    severe: { max: 0.2 }
  RLH:
    normal: { min: 0.6 }
    informational_only: true   # spec v2 §7.3: HIGH band is informational

# =============================================================================
# Transformer-type → combination catalogue
# =============================================================================
transformer_types:

  # ---------------------------------------------------------------------------
  # 5.1 TWO_WINDING — 15 combinations
  # Example fleet asset: 220/33 kV YNd11 power transformer
  # ---------------------------------------------------------------------------
  TWO_WINDING:
    description: "Two-winding power transformer (HV + LV). E.g. 220/33 kV YNd11."
    minimum_recommended: 9
    total: 15
    combinations:
      # ---- 1-3: EEOC HV (3 phases) ----
      - sequence: 1
        code: EEOC_HV_R
        category: EEOC_HV
        winding: HV
        phase: R
        injection_terminal: "1U"
        measurement_terminal: "1N"
        delta_alternate: { injection: "1U", measurement: "1V" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, HV phase R. All non-measured terminals floating."
      - sequence: 2
        code: EEOC_HV_S
        category: EEOC_HV
        winding: HV
        phase: S
        injection_terminal: "1V"
        measurement_terminal: "1N"
        delta_alternate: { injection: "1V", measurement: "1W" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, HV phase S."
      - sequence: 3
        code: EEOC_HV_T
        category: EEOC_HV
        winding: HV
        phase: T
        injection_terminal: "1W"
        measurement_terminal: "1N"
        delta_alternate: { injection: "1W", measurement: "1U" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, HV phase T."

      # ---- 4-6: EEOC LV (3 phases) ----
      - sequence: 4
        code: EEOC_LV_R
        category: EEOC_LV
        winding: LV
        phase: R
        injection_terminal: "2U"
        measurement_terminal: "2N"
        delta_alternate: { injection: "2U", measurement: "2V" }
        shorted_terminals: []
        grounded_terminals: []
        description: "End-to-end open circuit, LV phase R."
      - sequence: 5
        code: EEOC_LV_S
