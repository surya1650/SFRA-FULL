<?xml version="1.0" encoding="UTF-8"?>
<!--
APTRANSCO logo (SVG recreation matching the user-supplied PNG).
Drop a higher-resolution PNG into this folder as `aptransco_logo.png`
to override; the PDF report generator (src/sfra_full/reports/pdf.py)
prefers PNG/JPG/SVG in that order via `_logo_path()`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460" role="img" aria-label="AP TRANSCO ISO 27001 - 2022">
  <style>
    .tower { fill: none; stroke: #2563eb; stroke-width: 8; stroke-linejoin: round; stroke-linecap: round; }
    .crossarm { fill: #2563eb; }
    .bolt { fill: #ef4444; }
    .badge { fill: #2563eb; }
    .label { fill: #ffffff; font-family: "Helvetica Neue", "Inter", sans-serif; font-weight: 700; text-anchor: middle; }
  </style>

  <!-- Lightning bolts -->
  <polygon class="bolt" points="350,40 305,110 335,110 305,180 360,90 335,90"/>
  <polygon class="bolt" points="60,170 25,225 50,225 30,275 75,205 55,205"/>

  <!-- Tower silhouette (stylised) -->
  <g class="tower">
    <!-- Apex -->
    <path d="M200 30 L160 90 L240 90 Z"/>
    <!-- Vertical mast and bracing -->
    <path d="M170 90 L170 360"/>
    <path d="M230 90 L230 360"/>
    <path d="M170 130 L230 130"/>
    <path d="M170 175 L230 175"/>
    <path d="M170 220 L230 220"/>
    <path d="M170 265 L230 265"/>
    <path d="M170 310 L230 310"/>
    <!-- Cross-bracing X's -->
    <path d="M170 130 L230 175 M230 130 L170 175"/>
    <path d="M170 175 L230 220 M230 175 L170 220"/>
    <path d="M170 220 L230 265 M230 220 L170 265"/>
    <path d="M170 265 L230 310 M230 265 L170 310"/>
    <!-- Splayed base legs -->
    <path d="M170 360 L120 400 M230 360 L280 400"/>
    <path d="M120 400 L100 400 M280 400 L300 400"/>
  </g>

  <!-- Crossarm decorations -->
  <g class="crossarm">
    <rect x="115" y="125" width="55" height="10" rx="2"/>
    <rect x="230" y="125" width="55" height="10" rx="2"/>
    <rect x="100" y="170" width="70" height="10" rx="2"/>
    <rect x="230" y="170" width="70" height="10" rx="2"/>
    <rect x="90"  y="215" width="80" height="10" rx="2"/>
    <rect x="230" y="215" width="80" height="10" rx="2"/>
  </g>

  <!-- Badge -->
  <rect class="badge" x="20" y="365" width="360" height="80" rx="14"/>
  <text class="label" x="200" y="397" font-size="34">AP TRANSCO</text>
  <text class="label" x="200" y="430" font-size="22" letter-spacing="1">ISO 27001 - 2022</text>
</svg>
