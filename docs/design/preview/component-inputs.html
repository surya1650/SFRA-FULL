<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 16px; }
  .title { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; font-weight: 600; color: #334155; }
  input, select, textarea {
    font-family: 'Inter', sans-serif; font-size: 13px;
    border: 1px solid #cbd5e1; border-radius: 4px;
    padding: 6px 10px; background: white; color: #0f172a;
    outline: none;
  }
  input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
  textarea { resize: vertical; min-height: 60px; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #334155; }
  input[type=checkbox] { width: 14px; height: 14px; accent-color: #2563eb; }
  input[type=number] { width: 80px; }
  .sep { font-size: 11px; font-weight: 600; color: #94a3b8; margin-top: 6px; }
</style></head><body>
<div class="title">Form Inputs</div>
<div class="grid">
  <div class="field"><label>Transformer name</label><input type="text" value="TR-A1-230kV" placeholder="Enter name…"></div>
  <div class="field"><label>Measurement date</label><input type="date" value="2025-04-19"></div>
  <div class="field"><label>Standard</label>
    <select>
      <option>All Standards</option>
      <option selected>CIGRE TB 342/812</option>
      <option>IEEE C57.149</option>
      <option>IEC 60076-18</option>
    </select>
  </div>
  <div class="field"><label>Temperature (°C)</label><input type="number" value="23.5" step="0.5"></div>
  <div class="field" style="grid-column:1/-1;"><label>Report notes</label><textarea placeholder="Optional notes to include in the PDF report…">Winding A phase, tap position 3.</textarea></div>
</div>
<div class="sep" style="margin-top:10px;margin-bottom:6px;">Checkboxes &amp; Threshold</div>
<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
  <label class="checkbox-row"><input type="checkbox" checked> Sub-band shading</label>
  <label class="checkbox-row"><input type="checkbox"> Δ (test − ref) trace</label>
  <label class="checkbox-row" style="gap:6px;">Threshold (dB): <input type="number" step="0.5" value="3" style="width:60px;"></label>
</div>
</body></html>
