<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 16px; }
  .title { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .section { }
  .sub { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
  .token-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .swatch-space { display: flex; align-items: center; justify-content: flex-end; width: 60px; }
  .space-block { background: #2563eb; height: 12px; border-radius: 2px; opacity: 0.7; }
  .tok-name { font-size: 12px; color: #334155; font-family: monospace; width: 60px; }
  .tok-val  { font-size: 11px; color: #94a3b8; font-family: monospace; }
  .radius-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .radius-block { width: 36px; height: 36px; background: #2563eb; opacity: 0.7; }
  .shadow-row { display: flex; gap: 10px; }
  .shadow-block { width: 60px; height: 36px; background: white; border: 1px solid #e2e8f0; }
</style></head><body>
<div class="title">Spacing · Radius · Shadow</div>
<div class="grid">
  <div class="section">
    <div class="sub">Spacing Scale</div>
    <div class="token-row"><span class="tok-name">space-1</span><div class="swatch-space"><div class="space-block" style="width:4px"></div></div><span class="tok-val">4px</span></div>
    <div class="token-row"><span class="tok-name">space-2</span><div class="swatch-space"><div class="space-block" style="width:8px"></div></div><span class="tok-val">8px</span></div>
    <div class="token-row"><span class="tok-name">space-3</span><div class="swatch-space"><div class="space-block" style="width:12px"></div></div><span class="tok-val">12px</span></div>
    <div class="token-row"><span class="tok-name">space-4</span><div class="swatch-space"><div class="space-block" style="width:16px"></div></div><span class="tok-val">16px</span></div>
    <div class="token-row"><span class="tok-name">space-5</span><div class="swatch-space"><div class="space-block" style="width:20px"></div></div><span class="tok-val">20px (card pad)</span></div>
    <div class="token-row"><span class="tok-name">space-6</span><div class="swatch-space"><div class="space-block" style="width:24px"></div></div><span class="tok-val">24px (section)</span></div>
  </div>
  <div class="section">
    <div class="sub">Border Radius</div>
    <div class="radius-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div class="radius-block" style="border-radius:4px;"></div>
        <span style="font-size:10px;color:#64748b;font-family:monospace;">sm / 4px<br>buttons</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div class="radius-block" style="border-radius:8px;"></div>
        <span style="font-size:10px;color:#64748b;font-family:monospace;">md / 8px<br>cards</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div class="radius-block" style="border-radius:9999px;width:36px;height:36px;"></div>
        <span style="font-size:10px;color:#64748b;font-family:monospace;">full<br>avatars</span>
      </div>
    </div>
    <div class="sub" style="margin-top:10px;">Shadow</div>
    <div class="shadow-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div class="shadow-block" style="box-shadow:0 1px 3px 0 rgb(0 0 0/0.1),0 1px 2px -1px rgb(0 0 0/0.1);border-radius:6px;"></div>
        <span style="font-size:10px;color:#64748b;font-family:monospace;">shadow<br>(card default)</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div class="shadow-block" style="box-shadow:none;border-radius:6px;background:#f1f5f9;"></div>
        <span style="font-size:10px;color:#64748b;font-family:monospace;">none<br>(flat)</span>
      </div>
    </div>
  </div>
</div>
</body></html>
